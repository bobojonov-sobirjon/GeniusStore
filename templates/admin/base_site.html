{% extends "admin/base.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
/* Jazzmin related-object modal (+) — inline so production works after git pull without collectstatic */
.modal.modal-wide .modal-dialog {
    width: min(92vw, 960px) !important;
    max-width: none !important;
}
.modal-wide .modal-body {
    padding: 0 !important;
    overflow: hidden !important;
    min-height: 520px;
}
.modal-wide iframe.related-iframe,
.modal-wide #related-modal-iframe {
    display: block;
    width: 100% !important;
    min-width: 100% !important;
    height: 520px !important;
    min-height: 520px !important;
    border: none;
}
body.popup .main-header,
body.popup .main-sidebar,
body.popup .main-footer,
body.popup .content-header,
body.popup .breadcrumb,
body.popup #jazzy-actions .object-tools {
    display: none !important;
}
body.popup .content-wrapper {
    margin-left: 0 !important;
    margin-top: 0 !important;
    padding-top: 0 !important;
    min-height: auto !important;
}
body.popup .content,
body.popup #content,
body.popup #content-main {
    width: 100% !important;
    max-width: 100% !important;
    padding: 1rem !important;
}
body.popup .col-lg-9,
body.popup .col-lg-3 {
    flex: 0 0 100%;
    max-width: 100%;
}
body.popup #jazzy-actions {
    position: static !important;
    width: 100% !important;
    max-width: none !important;
    padding: 0 !important;
}

/* Product images inline — color dropdown width (works without collectstatic) */
.model-product.change-form #productimage_set-group table {
    min-width: 900px !important;
}
.model-product.change-form #productimage_set-group td.field-color,
.model-product.change-form #productimage_set-group th.field-color {
    min-width: 240px !important;
    width: 240px !important;
}
.model-product.change-form #productimage_set-group td.field-color select,
.model-product.change-form #productimage_set-group td.field-color .whale-color-select {
    min-width: 200px !important;
    width: 200px !important;
    max-width: none !important;
    writing-mode: horizontal-tb !important;
}
.model-product.change-form #productimage_set-group .tabular {
    overflow-x: auto !important;
}

/* Delete confirmation — buttons must stay readable (not input-gray + white text) */
body.delete-confirmation .card-body input[type="submit"].btn,
body.delete-selected-confirmation .card-body input[type="submit"].btn {
    background: #dc2626 !important;
    border: 1px solid #dc2626 !important;
    color: #fff !important;
    font-weight: 600 !important;
    min-height: 44px;
}

body.delete-confirmation .card-body a.cancel-link,
body.delete-selected-confirmation .card-body a.cancel-link {
    background: #f3f4f6 !important;
    border: 1px solid var(--whale-border) !important;
    color: var(--whale-text) !important;
    font-weight: 600 !important;
    min-height: 44px;
    display: block;
    text-align: center;
    line-height: 1.5;
    padding: 0.6rem 0.85rem !important;
}

body.delete-confirmation .card-body a.cancel-link:hover,
body.delete-selected-confirmation .card-body a.cancel-link:hover {
    background: #e5e7eb !important;
    color: var(--whale-text) !important;
}

/* Characteristics — Тип dropdown wider + taller (works without collectstatic) */
.model-product.change-form #productcharacteristic_set-group th.field-spec_type,
.model-product.change-form #productcharacteristic_set-group td.field-spec_type {
    min-width: 280px !important;
    width: 280px !important;
}
.model-product.change-form #productcharacteristic_set-group td.field-spec_type select,
.model-product.change-form #productcharacteristic_set-group td.field-spec_type .whale-spec-type-select,
.model-product.change-form #productcharacteristic_set-group td.field-spec_type .select2-container {
    min-width: 260px !important;
    width: 260px !important;
    max-width: none !important;
}
body.model-product .select2-container--open .select2-dropdown {
    min-width: 280px !important;
}
body.model-product .select2-container--open .select2-results__options {
    max-height: 420px !important;
}
body.model-product .select2-container--open .select2-results__option {
    white-space: nowrap !important;
}
</style>
{% endblock %}

{% block extrajs %}
{{ block.super }}
<script>
(function () {
    'use strict';
    if (!window.jQuery || document.body.className.indexOf('popup') !== -1) {
        return;
    }
    (function ($) {
        function fixRelatedModalIframe() {
            $('iframe.related-iframe, #related-modal-iframe').each(function () {
                this.style.display = 'block';
                this.style.width = '100%';
                this.style.minWidth = '100%';
                this.style.height = '520px';
                this.style.minHeight = '520px';
                this.style.border = 'none';
            });
        }
        $(document).on('shown.bs.modal', '[class*="related-modal-"]', fixRelatedModalIframe);
        $(document).on('click', 'a.related-widget-wrapper-link, a.related-lookup', function () {
            setTimeout(fixRelatedModalIframe, 50);
            setTimeout(fixRelatedModalIframe, 300);
        });

        function fixProductImageColorSelects() {
            $('#productimage_set-group td.field-color select, #productimage_set-group td.field-color .select2-container')
                .css({ 'min-width': '200px', 'width': '200px', 'max-width': 'none' });
        }
        function fixSpecTypeSelects() {
            $('#productcharacteristic_set-group td.field-spec_type select, #productcharacteristic_set-group td.field-spec_type .select2-container')
                .css({ 'min-width': '260px', 'width': '260px', 'max-width': 'none' });
        }
        if ($('body').hasClass('model-product')) {
            fixProductImageColorSelects();
            fixSpecTypeSelects();
            setTimeout(fixSpecTypeSelects, 300);
            $(document).on('formset:added', function (event, $row) {
                if ($row && $row.closest('#productimage_set-group').length) {
                    fixProductImageColorSelects();
                }
                if ($row && $row.closest('#productcharacteristic_set-group').length) {
                    setTimeout(fixSpecTypeSelects, 50);
                }
            });
        }
    })(jQuery);
})();
</script>
{% endblock %}
